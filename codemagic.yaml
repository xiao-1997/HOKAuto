workflows:
  build-deb:
    name: Build iOS .deb
    max_build_duration: 120
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    environment:
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Compile touch injector
        script: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -mios-version-min=13.0 -isysroot "$SDK" \
            -o touch_inject HOKAuto/touch_inject.c -framework IOKit

      - name: Build iOS app
        script: |
          xcodebuild -project HOKAuto.xcodeproj \
            -scheme HOKAuto -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO -derivedDataPath build
      - name: Create .deb
        script: |
          brew install dpkg ldid-procursus
          mkdir -p deb/DEBIAN deb/Applications
          FOUND=$(find build -name "HOKAuto.app" -type d | head -1)
          APP="${FOUND:-build/Build/Products/Debug-iphoneos/HOKAuto.app}"
          echo "App path: $APP"
          cp -r "$APP" deb/Applications/
          # 拷贝触控注入器
          cp touch_inject deb/Applications/HOKAuto.app/
          # 假签名
          ldid -S deb/Applications/HOKAuto.app/HOKAuto
          ldid -S deb/Applications/HOKAuto.app/touch_inject
          cat > deb/DEBIAN/control << 'EOF'
          Package: com.automation.hokauto
          Name: HOK Auto
          Version: 1.0
          Architecture: iphoneos-arm
          Description: 王者荣耀自动化
          Section: Applications
          EOF
          cat > deb/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          chmod 777 /Applications/HOKAuto.app/HOKAuto
          if command -v ldid &>/dev/null; then
            ldid -S /Applications/HOKAuto.app/HOKAuto
          fi
          chown -R mobile:mobile /Applications/HOKAuto.app
          uicache -a
          killall SpringBoard 2>/dev/null || true
          EOF
          chmod +x deb/DEBIAN/postinst
          dpkg-deb -b deb hok_auto_1.0_iphoneos-arm.deb
    artifacts:
      - hok_auto_1.0_iphoneos-arm.deb
